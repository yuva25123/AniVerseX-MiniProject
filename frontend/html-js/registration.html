<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniVerseX Registration</title>
  <style>
    :root {
      --bg: #101820;
      --panel: #182634;
      --text: #eef6ff;
      --muted: #b3c3d6;
      --error: #ff6b6b;
      --ok: #73e2a7;
      --accent: #f4a261;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", sans-serif;
      background: linear-gradient(145deg, #101820, #23364c);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(680px, 100%);
      background: rgba(24, 38, 52, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
    }
    input, select, textarea, button {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }
    button {
      background: linear-gradient(120deg, #f4a261, #e76f51);
      border: 0;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      color: var(--error);
      min-height: 18px;
      font-size: 0.88rem;
      margin-top: 5px;
    }
    .success {
      color: var(--ok);
      margin-top: 12px;
      font-weight: 700;
    }
    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AniVerseX User Registration</h1>
    <p>Create an account to review anime and save your recommendations.</p>

    <form id="registrationForm" novalidate>
      <div class="row">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" />
          <div class="error" id="usernameError"></div>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" />
          <div class="error" id="emailError"></div>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" />
          <div class="error" id="passwordError"></div>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" />
          <div class="error" id="confirmPasswordError"></div>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="favoriteGenre">Favorite Genre</label>
          <select id="favoriteGenre">
            <option value="">Select genre</option>
            <option>Action</option>
            <option>Adventure</option>
            <option>Fantasy</option>
            <option>Thriller</option>
          </select>
          <div class="error" id="genreError"></div>
        </div>
        <div class="field">
          <label for="experience">Anime Watching Experience</label>
          <input id="experience" type="text" placeholder="Beginner / Regular / Hardcore fan" />
        </div>
      </div>

      <div class="field">
        <label for="bio">Short Bio</label>
        <textarea id="bio" rows="4" placeholder="Tell us about your anime interests"></textarea>
      </div>

      <button type="submit">Register</button>
      <div class="success" id="successMessage"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("registrationForm");
    const fields = {
      username: document.getElementById("username"),
      email: document.getElementById("email"),
      password: document.getElementById("password"),
      confirmPassword: document.getElementById("confirmPassword"),
      favoriteGenre: document.getElementById("favoriteGenre")
    };

    const errors = {
      username: document.getElementById("usernameError"),
      email: document.getElementById("emailError"),
      password: document.getElementById("passwordError"),
      confirmPassword: document.getElementById("confirmPasswordError"),
      genre: document.getElementById("genreError")
    };

    const successMessage = document.getElementById("successMessage");

    function clearMessages() {
      Object.values(errors).forEach((node) => {
        node.textContent = "";
      });
      successMessage.textContent = "";
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      clearMessages();

      let valid = true;

      if (fields.username.value.trim().length < 3) {
        errors.username.textContent = "Username must contain at least 3 characters.";
        valid = false;
      }

      if (!isValidEmail(fields.email.value.trim())) {
        errors.email.textContent = "Enter a valid email address.";
        valid = false;
      }

      if (fields.password.value.length < 8) {
        errors.password.textContent = "Password must be at least 8 characters.";
        valid = false;
      }

      if (fields.password.value !== fields.confirmPassword.value) {
        errors.confirmPassword.textContent = "Passwords do not match.";
        valid = false;
      }

      if (!fields.favoriteGenre.value) {
        errors.genre.textContent = "Please select a genre.";
        valid = false;
      }

      if (valid) {
        successMessage.textContent = "Registration successful. You can now review anime on AniVerseX.";
        form.reset();
      }
    });
  </script>
</body>
</html>
