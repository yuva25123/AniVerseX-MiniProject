<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniVerseX - Anime Recommendations and Reviews</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-overlay" aria-hidden="true"></div>

  <header class="site-header container">
    <div class="brand-row">
      <img src="../assets/images/logo.png" alt="AniVerseX Logo" class="site-logo" />
      <h1>Anime Recommendations & Reviews</h1>
    </div>
    <p class="subtitle">Mini project module for JavaScript events, objects, and client-side interaction</p>
  </header>

  <main class="container app-grid">
    <section class="panel form-panel">
      <h2>Write a Review</h2>

      <form id="reviewForm" novalidate>
        <div class="field-group">
          <label for="animeSelect">Select Anime</label>
          <select id="animeSelect" name="anime"></select>
        </div>

        <div class="field-group">
          <label for="ratingRange">Rating: <span id="ratingValue">3</span>/5</label>
          <input id="ratingRange" name="rating" type="range" min="1" max="5" value="3" />
        </div>

        <div class="field-group">
          <label for="reviewerName">Reviewer Name</label>
          <input id="reviewerName" name="reviewer" type="text" placeholder="Enter your name" />
        </div>

        <div class="field-group">
          <label for="reviewText">Review</label>
          <textarea id="reviewText" name="reviewText" rows="5" placeholder="Share your spoiler-free thoughts"></textarea>
        </div>

        <div class="button-row">
          <button id="addReviewBtn" type="submit">Add Review</button>
          <button id="favoriteBtn" type="button">Add to Favorites</button>
          <button id="resetBtn" type="button" class="ghost">Reset</button>
        </div>
      </form>
    </section>

    <section class="panel details-panel" id="detailsCard">
      <div class="status-line" id="hoverStatus">Hover here to see anime status</div>
      <div id="animeDetails"></div>

      <section class="reviews-wrap">
        <h3 id="reviewsHeading">Reviews (0)</h3>
        <div id="reviewsList" class="reviews-list"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
